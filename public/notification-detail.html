<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ติดตามสถานะ</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f4f7f2;
      --surface: rgba(255, 255, 255, 0.74);
      --surface-strong: rgba(255, 255, 255, 0.88);
      --border-soft: rgba(46, 125, 50, 0.14);
      --text-primary: #24323a;
      --text-secondary: #526168;
      --green: #2e7d32;
      --green-soft: #e8f5e9;
      --danger: #e53935;
      --shadow-soft: 0 24px 70px rgba(35, 57, 35, 0.10);
      --shadow-lift: 0 18px 32px rgba(24, 46, 24, 0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--page-bg) !important;
      color: var(--text-primary);
      font-family: 'Kanit', 'Prompt', ui-sans-serif, system-ui, sans-serif;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -8rem;
      right: -6rem;
      width: 22rem;
      height: 22rem;
      border-radius: 9999px;
      background: radial-gradient(circle at center, rgba(46, 125, 50, 0.18), transparent 70%);
      filter: blur(24px);
    }

    body::after {
      bottom: -5rem;
      left: -4rem;
      width: 20rem;
      height: 20rem;
      border-radius: 9999px;
      background: radial-gradient(circle at center, rgba(129, 199, 132, 0.15), transparent 70%);
      filter: blur(30px);
    }

    .page-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      overflow: clip;
    }

    .bg-page-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(180deg, rgba(244, 247, 242, 0.95), rgba(244, 247, 242, 0.88)),
        url('/images/rice-mill-hero.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.24;
      filter: blur(12px) saturate(0.92) brightness(1.02);
      transform: scale(1.05);
    }

    .bg-orb {
      position: fixed;
      border-radius: 9999px;
      filter: blur(16px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .bg-orb--one { top: 7rem; left: 2rem; width: 12rem; height: 12rem; background: rgba(232, 245, 233, 0.55); }
    .bg-orb--two { top: 24rem; right: 1rem; width: 9rem; height: 9rem; background: rgba(205, 220, 184, 0.36); }

    .glass-header,
    .glass-card,
    .notice-box,
    .status-card,
    .timeline-card,
    .resource-card,
    .modal-card {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-soft);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .glass-header {
      background: var(--surface-strong);
    }

    .hero-divider {
      width: 4.75rem;
      height: 0.2rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, var(--green), rgba(46, 125, 50, 0.10));
      position: relative;
    }

    .hero-divider::after {
      content: '';
      position: absolute;
      right: -0.12rem;
      top: -0.22rem;
      width: 0.65rem;
      height: 0.65rem;
      background: var(--green);
      clip-path: polygon(50% 0%, 68% 28%, 100% 34%, 78% 56%, 82% 90%, 50% 72%, 18% 90%, 22% 56%, 0 34%, 32% 28%);
      transform: rotate(35deg);
      opacity: 0.9;
    }

    .section-fade {
      animation: fadeUp 0.75s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .timeline-track {
      position: relative;
      min-height: 100%;
    }

    .timeline-track::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -0.5rem;
      bottom: -0.5rem;
      width: 0.18rem;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(46, 125, 50, 0.25), rgba(46, 125, 50, 0.96));
      border-radius: 9999px;
    }

    .timeline-dot {
      display: none;
    }

    .timeline-entry {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.6s ease forwards;
      animation-delay: var(--delay, 0ms);
    }

    .timeline-entry:hover .timeline-content {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lift);
    }

    .timeline-content {
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background-color 180ms ease;
    }

    .timeline-date {
      color: var(--text-secondary);
    }

    .timeline-date--mobile {
      white-space: nowrap;
    }

    .timeline-status-title {
      color: var(--text-primary);
    }

    .page-chip {
      border: 1px solid rgba(46, 125, 50, 0.18);
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
    }

    .status-pill--active {
      background: var(--green-soft);
      color: var(--green);
      border-color: rgba(46, 125, 50, 0.18);
    }

    .status-pill--muted {
      background: rgba(248, 250, 248, 0.82);
      color: var(--text-secondary);
      border-color: rgba(148, 163, 184, 0.16);
    }

    .modal-backdrop {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .icon-surface {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 9999px;
      background: rgba(46, 125, 50, 0.08);
      color: var(--green);
      flex: 0 0 auto;
    }

    .icon-surface--sm {
      width: 1.75rem;
      height: 1.75rem;
    }

    .button-soft-danger {
      border: 1px solid rgba(229, 57, 53, 0.24);
      background: rgba(229, 57, 53, 0.08);
      color: #d32f2f;
    }

    .button-soft-danger:hover {
      background: rgba(229, 57, 53, 0.14);
    }

    .button-outline-green {
      border: 1px solid rgba(46, 125, 50, 0.24);
      background: rgba(255, 255, 255, 0.68);
      color: var(--green);
    }

    .button-outline-green:hover {
      background: rgba(232, 245, 233, 0.7);
    }

    @media (max-width: 768px) {
      .timeline-track::before {
        left: 1.4rem;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .header-action-btn,
      .header-action-link {
        width: auto;
        min-width: 0;
        padding: 0.55rem 0.85rem;
        font-size: 0.9rem;
        line-height: 1.1;
      }

      .header-action-btn span:last-child,
      .header-action-link span:last-child {
        white-space: nowrap;
      }
    }

    @media (max-width: 640px) {
      .timeline-date {
        font-size: 0.92rem;
      }

      .header-brand {
        width: 100%;
      }

      .header-actions {
        flex-wrap: nowrap;
        gap: 0.5rem;
      }

      .header-action-btn,
      .header-action-link {
        flex: 1 1 0;
        justify-content: center;
        padding-inline: 0.7rem;
        font-size: 0.84rem;
      }

      .header-action-btn .icon-surface--sm,
      .header-action-link .icon-surface--sm {
        display: none;
      }
    }
  </style>
</head>
<body class="min-h-screen text-gray-700">
  <div class="page-shell">
    <div class="bg-page-image"></div>
    <div class="bg-orb bg-orb--one"></div>
    <div class="bg-orb bg-orb--two"></div>

    <header class="sticky top-0 z-40 px-3 pt-3 sm:px-4 sm:pt-4">
      <div class="glass-header mx-auto w-full max-w-6xl rounded-[1.75rem] px-4 py-4 sm:px-6 sm:py-5">
        <nav class="flex flex-wrap items-center justify-between gap-3 sm:gap-4">
          <a href="/" class="header-brand flex items-center gap-3 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-field-600">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-green-100 to-emerald-50 text-xl shadow-sm">🌾</span>
            <span class="text-xl sm:text-2xl font-extrabold tracking-tight text-field-700">โรงสีชุมชน</span>
          </a>
          <div class="header-actions flex flex-wrap items-center justify-end gap-2 sm:gap-3">
            <button id="detail-cancel-btn" type="button" class="hidden header-action-btn inline-flex items-center gap-2 rounded-full px-4 py-2 text-sm font-semibold transition button-soft-danger focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-500">
              <span class="icon-surface icon-surface--sm" style="background: rgba(255,255,255,0.65); color: #d32f2f;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><circle cx="12" cy="12" r="9"></circle><path d="M15 9l-6 6"></path><path d="M9 9l6 6"></path></svg>
              </span>
              <span>รอยืนยันการยกเลิก</span>
            </button>
            <a href="/notifications.html" class="header-action-link inline-flex items-center gap-2 rounded-full px-4 py-2 text-sm font-semibold transition button-outline-green focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-field-600">
              <span class="icon-surface icon-surface--sm" style="background: rgba(255,255,255,0.65);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M15 18l-6-6 6-6"></path></svg>
              </span>
              <span>กลับไปหน้าแจ้งเตือน</span>
            </a>
          </div>
        </nav>
      </div>
    </header>

    <main class="relative z-10 px-4 py-6 sm:px-6 sm:py-8 lg:py-10">
      <div class="mx-auto w-full max-w-6xl">
        <section class="glass-card section-fade overflow-hidden rounded-[2rem] p-4 sm:p-6 lg:p-8">
          <div class="grid gap-6 lg:gap-8">
            <div class="grid gap-4 border-b border-white/60 pb-5 sm:pb-6">
              <div class="flex flex-wrap items-center gap-3">
                <p id="detail-kicker" class="text-sm font-semibold tracking-wide text-green-700">กำลังโหลด...</p>
              </div>
              <div class="space-y-4">
                <h1 id="detail-title" class="max-w-3xl text-3xl font-extrabold tracking-tight text-gray-700 sm:text-4xl lg:text-5xl">เส้นทางสถานะ</h1>
                <div class="hero-divider"></div>
              </div>
            </div>

            <div class="notice-box rounded-[1.5rem] px-4 py-4 sm:px-5 sm:py-5">
              <div class="flex items-start gap-3">
                <span class="icon-surface mt-0.5">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4.5 w-4.5"><circle cx="12" cy="12" r="9"></circle><path d="M12 8h.01"></path><path d="M11 12h1v4h1"></path></svg>
                </span>
                <div>
                  <p class="text-sm sm:text-base font-medium text-green-900/90">คุณสามารถติดตามสถานะ และตรวจสอบความคืบหน้าของคำขอสีข้าวได้ที่นี่</p>
                </div>
              </div>
            </div>

            <div id="cancellation-banner" class="hidden rounded-[1.5rem] px-4 py-4 text-sm sm:px-5 sm:text-base"></div>

            <div id="timeline-empty" class="hidden rounded-[1.5rem] border border-dashed border-green-200 bg-white/65 px-6 py-16 text-center text-gray-500 shadow-sm">
              ยังไม่มีประวัติสถานะสำหรับรายการนี้
            </div>

            <div id="timeline-shell" class="relative">
              <div id="timeline-list" class="relative space-y-1"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="cancel-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 py-6" aria-hidden="true">
    <div class="modal-card w-full max-w-xl rounded-[1.75rem] bg-white shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="border-b border-gray-100 px-5 py-4 sm:px-6">
        <h2 class="text-lg sm:text-xl font-semibold text-red-600">เลือกเหตุผลที่ต้องการยกเลิก</h2>
      </div>
      <form id="cancel-form" class="flex min-h-0 flex-col">
        <div class="min-h-0 flex-1 overflow-y-auto px-5 py-4 sm:px-6">
          <div id="cancel-choices" class="space-y-3"></div>
        </div>
        <div class="border-t border-gray-100 px-5 py-4 sm:px-6">
          <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
            <button id="cancel-close-btn" type="button" class="inline-flex items-center justify-center rounded-full border border-gray-300 px-5 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-50">ปิด</button>
            <button id="cancel-submit-btn" type="submit" class="inline-flex items-center justify-center rounded-full border border-red-500 bg-red-500 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-red-600">ส่งคำขอยกเลิก</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const ORDER_LABELS = {
      pending: 'รอดำเนินการ',
      accepted: 'ยอมรับคำสั่งซื้อแล้ว',
      pending_payment: 'รอชำระเงิน',
      payment_review: 'รอตรวจสอบการชำระเงิน',
      paid: 'ชำระเงินแล้ว',
      preparing: 'กำลังเตรียมสินค้า',
      ready_to_ship: 'พร้อมจัดส่ง',
      shipping: 'จัดส่งแล้ว',
      completed: 'สำเร็จ',
      cancelled: 'ยกเลิกคำสั่งซื้อสินค้าแล้ว',
      pending_cancel: 'รอยืนยันการยกเลิกคำสั่งซื้อ',
      approved_cancel: 'ยกเลิกคำสั่งซื้อสินค้าแล้ว',
      rejected_cancel: 'ปฏิเสธคำขอยกเลิก'
    };

    const MILLING_LABELS = {
      pending_review: 'รอตรวจสอบ',
      accepted: 'รับคำสั่งแล้ว',
      awaiting_pickup: 'รอไปรับข้าว',
      received: 'รับข้าวแล้ว',
      queued: 'รอคิวสี',
      milling: 'กำลังสีข้าว',
      packing: 'กำลังแพ็ก',
      ready: 'พร้อมรับ/จัดส่ง',
      shipping: 'กำลังจัดส่ง',
      delivered: 'ส่งมอบแล้ว',
      cancelled: 'ยกเลิกคำขอสีข้าวแล้ว',
      pending_cancel: 'รอยืนยันการยกเลิกคำขอสีข้าว',
      approved_cancel: 'ยกเลิกคำขอสีข้าวแล้ว',
      rejected_cancel: 'ปฏิเสธคำขอยกเลิก'
    };

    const CANCELLATION_REASONS = ['เปลี่ยนใจ', 'พบราคาถูกกว่า', 'ต้องการแก้ไขข้อมูล/ที่อยู่', 'โรงสียังไม่สะดวก', 'อื่นๆ'];
    const CANCELLABLE_ORDER_STATUSES = new Set(['pending', 'accepted', 'pending_payment', 'payment_review', 'paid', 'preparing']);
    const CANCELLABLE_MILLING_STATUSES = new Set(['pending_review', 'accepted', 'awaiting_pickup']);

    let currentResource = null;
    let currentCancellation = null;
    let currentDetailType = null;
    let currentDetailResourceId = null;

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatShortDateTime(value) {
      const date = new Date(value);
      const day = date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      const time = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      return { day, time: `${time} น.` };
    }

    function parseDate(value) {
      const date = new Date(value);
      return Number.isFinite(date.getTime()) ? date : null;
    }

    function shiftMinutes(date, minutes) {
      const next = new Date(date.getTime());
      next.setMinutes(next.getMinutes() + minutes);
      return next;
    }

    function statusLabel(type, status) {
      const map = type === 'order' ? ORDER_LABELS : MILLING_LABELS;
      return map[status] || status || '-';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getStatusDescription(type, status) {
      const descriptions = {
        pending_review: 'คำขอสีข้าวของคุณอยู่ระหว่างการตรวจสอบข้อมูล',
        pending_cancel: type === 'order'
          ? 'อยู่ระหว่างรอการยืนยันการยกเลิกคำสั่งซื้อ'
          : 'อยู่ระหว่างรอการยืนยันการยกเลิกคำขอสีข้าว',
        approved_cancel: 'การยกเลิกได้รับการยืนยันแล้ว',
        rejected_cancel: 'คำขอยกเลิกถูกปฏิเสธ',
      };

      return descriptions[status] || statusLabel(type, status);
    }

    function statusTone(status) {
      if (status === 'pending_cancel' || status === 'approved_cancel') return 'active';
      if (status === 'rejected_cancel') return 'danger';
      return 'muted';
    }

    function statusIcon(status) {
      const activeIcon = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <path d="M14 2H7a2 2 0 0 0-2 2v16l5-3 5 3 5-3V8z"></path>
          <path d="M9 12l2 2 4-4"></path>
        </svg>`;
      const searchIcon = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>`;
      const dangerIcon = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M15 9l-6 6"></path>
          <path d="M9 9l6 6"></path>
        </svg>`;

      if (status === 'pending_cancel' || status === 'approved_cancel') return activeIcon;
      if (status === 'rejected_cancel') return dangerIcon;
      return searchIcon;
    }

    function buildDerivedTimeline(type, resource, latestItems) {
      if (Array.isArray(latestItems) && latestItems.length > 0) {
        return latestItems;
      }

      const status = String(resource?.status || '').trim();
      if (!status) return [];

      const sourceDate = parseDate(resource?.updated_at || resource?.created_at || new Date()) || new Date();
      return [{
        type,
        resource_id: resource?.request_id || resource?.order_id,
        status,
        message: statusLabel(type, status),
        is_read: true,
        created_at: sourceDate.toISOString(),
        label: statusLabel(type, status),
        day: formatShortDateTime(sourceDate).day,
        time: formatShortDateTime(sourceDate).time,
      }];
    }

    function getEncodedSession() {
      const session = window.OwnerSession?.get?.() || {};
      return (typeof window.btoa === 'function')
        ? window.btoa(unescape(encodeURIComponent(JSON.stringify(session))))
        : encodeURIComponent(JSON.stringify(session));
    }

    function getResourceOwnerId(type, resource) {
      if (!resource) return null;
      return type === 'order' ? Number(resource.villager_id || 0) : Number(resource.submitted_by || 0);
    }

    function getCancellationLabel(status) {
      return statusLabel(currentDetailType || 'order', status);
    }

    function buildOwnerCancellationText(resource, cancellation) {
      const type = currentDetailType || 'order';
      if (cancellation?.status === 'approved_cancel') {
        return 'คำขอยกเลิกได้รับการยอมรับจากเจ้าของโรงสีแล้ว';
      }

      const reasonText = String(resource?.cancel_reason || cancellation?.resource_status || '').trim();
      const base = type === 'order'
        ? 'ออเดอร์ถูกยกเลิกโดยเจ้าของโรงสี'
        : 'คำขอสีข้าวถูกยกเลิกโดยเจ้าของโรงสี';
      return reasonText ? `${base}: ${reasonText}` : base;
    }

    function updateCancellationBanner(status, resource = null, cancellation = null) {
      const banner = document.getElementById('cancellation-banner');
      if (!banner) return;

      const resourceStatus = String(resource?.status || '').trim();
      const cancelledByOwner = resourceStatus === 'cancelled' || status === 'approved_cancel';
      if (!status && !cancelledByOwner) {
        banner.className = 'hidden rounded-[1.5rem] px-4 py-3 text-sm sm:text-base';
        banner.textContent = '';
        return;
      }

      banner.className = 'rounded-[1.5rem] px-4 py-3 text-sm sm:text-base';
      if (cancelledByOwner) {
        banner.classList.add('border', 'border-gray-200', 'bg-gray-50', 'text-gray-700');
      } else if (status === 'pending_cancel') {
        banner.classList.add('border', 'border-green-200', 'bg-green-50', 'text-green-900');
      } else if (status === 'approved_cancel') {
        banner.classList.add('border', 'border-green-200', 'bg-green-50', 'text-green-900');
      } else if (status === 'rejected_cancel') {
        banner.classList.add('border', 'border-red-200', 'bg-red-50', 'text-red-900');
      } else {
        banner.classList.add('border', 'border-gray-200', 'bg-gray-50', 'text-gray-700');
      }
      banner.innerHTML = `
        <div class="flex items-start gap-3">
          <span class="icon-surface mt-0.5 !h-9 !w-9 ${status === 'rejected_cancel' ? '!text-red-600' : '!text-green-700'}">
            ${cancelledByOwner ? statusIcon('approved_cancel') : statusIcon(status)}
          </span>
          <div>
            <div class="text-base font-semibold">${escapeHtml(cancelledByOwner ? (currentDetailType === 'order' ? 'ยกเลิกคำสั่งซื้อสินค้าแล้ว' : 'ยกเลิกคำขอสีข้าวแล้ว') : getCancellationLabel(status))}</div>
            <div class="mt-1 text-sm opacity-90">${escapeHtml(cancelledByOwner ? buildOwnerCancellationText(resource, cancellation) : getStatusDescription(currentDetailType || 'milling', status))}</div>
          </div>
        </div>
      `;
    }

    function renderResourceNote(resource) {
      return resource;
    }

    function renderCancellationReasons() {
      const wrap = document.getElementById('cancel-choices');
      if (!wrap || wrap.dataset.ready === 'true') return;
      wrap.innerHTML = CANCELLATION_REASONS.map((reason, index) => `
        <label class="flex items-start gap-3 rounded-2xl border border-gray-200 px-3 py-2 text-sm text-gray-700 transition hover:border-rice-700 hover:bg-rice-50 sm:text-base">
          <input type="checkbox" class="mt-1 h-4 w-4 rounded border-gray-300 text-rice-700 focus:ring-rice-700" value="${reason}" id="cancel-choice-${index}">
          <span>${reason}</span>
        </label>
      `).join('');
      wrap.dataset.ready = 'true';
    }

    function resetCancellationForm() {
      document.querySelectorAll('#cancel-choices input[type="checkbox"]').forEach((input) => {
        input.checked = false;
      });
      const note = document.getElementById('cancel-additional-note');
      if (note) note.value = '';
    }

    function openCancellationModal() {
      const modal = document.getElementById('cancel-modal');
      if (!modal) return;
      modal.classList.remove('hidden');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeCancellationModal() {
      const modal = document.getElementById('cancel-modal');
      if (!modal) return;
      modal.classList.add('hidden');
      modal.setAttribute('aria-hidden', 'true');
    }

    function syncCancellationButton(resource, cancellation) {
      const btn = document.getElementById('detail-cancel-btn');
      if (!btn || !currentDetailType || !resource) return;

      const session = window.OwnerSession?.get?.();
      const ownerId = getResourceOwnerId(currentDetailType, resource);
      const villagerId = Number(session?.villager_id || 0);
      const belongsToUser = ownerId && villagerId && ownerId === villagerId;
      const cancelable = currentDetailType === 'order'
        ? CANCELLABLE_ORDER_STATUSES.has(String(resource.status || '').trim())
        : CANCELLABLE_MILLING_STATUSES.has(String(resource.status || '').trim());

      if (!belongsToUser || !cancelable) {
        btn.classList.add('hidden');
        return;
      }

      btn.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'ยกเลิกสินค้า';
      btn.onclick = () => openCancellationModal();

      if (cancellation?.status === 'pending_cancel') {
        btn.disabled = true;
        btn.textContent = 'รอยืนยันการยกเลิก';
      } else if (cancellation?.status === 'approved_cancel') {
        btn.disabled = true;
        btn.textContent = 'ยกเลิกสำเร็จแล้ว';
      } else if (cancellation?.status === 'rejected_cancel') {
        btn.disabled = true;
        btn.textContent = 'ปฏิเสธคำขอยกเลิก';
      }
    }

    function renderStatusCard(item, index, type) {
      const tone = statusTone(item.status);
      const short = formatShortDateTime(item.created_at);
      const title = escapeHtml(item.label || statusLabel(type, item.status));
      const rawMessage = String(item.message || '').trim();
      const fallbackDescription = getStatusDescription(type, item.status);
      const description = escapeHtml(!rawMessage || rawMessage === title ? fallbackDescription : rawMessage);
      const active = index === 0 || tone === 'active';
      const cardClasses = active
        ? 'status-card status-pill--active rounded-[1.5rem] border border-green-200/80 px-4 py-4 sm:px-5 sm:py-5'
        : 'status-card status-pill--muted rounded-[1.5rem] border px-4 py-4 sm:px-5 sm:py-5';
      const dateText = `${escapeHtml(short.day)}<br><span class="text-xs sm:text-sm font-semibold">${escapeHtml(short.time)}</span>`;

      return `
        <div class="timeline-entry grid grid-cols-[5.4rem_2.9rem_minmax(0,1fr)] gap-3 sm:grid-cols-[7.2rem_3.4rem_minmax(0,1fr)] sm:gap-4" style="--delay:${index * 90}ms">
          <div class="timeline-date pt-3 text-right text-sm font-semibold leading-6 sm:text-base">
            <div>${dateText}</div>
          </div>
          <div class="timeline-track flex justify-center">
            <div class="timeline-dot ${active ? 'text-green-700' : 'text-gray-500'}" aria-hidden="true"></div>
          </div>
          <div class="min-w-0">
            <div class="timeline-content ${cardClasses}">
              <div class="flex items-start gap-3">
                <div class="min-w-0 flex-1">
                  <div class="timeline-status-title text-lg font-bold leading-tight sm:text-2xl">${title}</div>
                  <p class="mt-2 text-sm leading-6 text-gray-600 sm:text-base">${description}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadCancellationState(type, resourceId, resource) {
      try {
        const resp = await fetch(`/api/notifications/cancellations/${encodeURIComponent(type)}/${encodeURIComponent(resourceId)}`, {
          headers: { 'x-session-data': getEncodedSession() }
        });
        const json = await resp.json().catch(() => null);
        if (resp.ok && json?.success) {
          currentCancellation = json.data || null;
          updateCancellationBanner(currentCancellation?.status || null, resource, currentCancellation);
          syncCancellationButton(resource, currentCancellation);
          return currentCancellation;
        }
      } catch (err) {
        console.error('load cancellation state failed:', err);
      }

      currentCancellation = null;
      updateCancellationBanner(null, resource, null);
      syncCancellationButton(resource, null);
      return null;
    }

    async function submitCancellation() {
      const choices = Array.from(document.querySelectorAll('#cancel-choices input[type="checkbox"]:checked')).map((input) => input.value);
      const additionalNote = document.getElementById('cancel-additional-note')?.value?.trim() || '';

      if (choices.length === 0) {
        showToast('กรุณาเลือกเหตุผลอย่างน้อย 1 ข้อ', 'error');
        return;
      }

      try {
        const resp = await fetch('/api/notifications/cancellations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-session-data': getEncodedSession(),
          },
          body: JSON.stringify({
            type: currentDetailType,
            resource_id: currentDetailResourceId,
            choices,
            additional_note: additionalNote,
          }),
        });

        const json = await resp.json().catch(() => null);
        if (!resp.ok || !json?.success) {
          throw new Error(json?.message || 'ไม่สามารถส่งคำขอยกเลิกได้');
        }

        showToast('ส่งคำขอยกเลิกเรียบร้อยแล้ว', 'success');
        closeCancellationModal();
        resetCancellationForm();
        await loadTimeline();
        await loadCancellationState(currentDetailType, currentDetailResourceId, currentResource);
        window.dispatchEvent(new Event('notifications:changed'));
      } catch (err) {
        console.error('cancel submit failed:', err);
        showToast(err.message || 'เกิดข้อผิดพลาดขณะส่งคำขอยกเลิก', 'error');
      }
    }

    async function loadTimeline() {
      const type = getParam('type');
      const resourceId = getParam('resource_id');
      const kicker = document.getElementById('detail-kicker');
      const title = document.getElementById('detail-title');
      const list = document.getElementById('timeline-list');
      const empty = document.getElementById('timeline-empty');
      const shell = document.getElementById('timeline-shell');

      if (!type || !resourceId) {
        kicker.textContent = 'ไม่พบรายการ';
        title.textContent = 'ติดตามสถานะ';
        empty.classList.remove('hidden');
        return;
      }

      currentDetailType = type;
      currentDetailResourceId = resourceId;

      try {
        const resp = await fetch(`/api/notifications/${encodeURIComponent(type)}/${encodeURIComponent(resourceId)}/timeline`, {
          headers: { 'x-session-data': getEncodedSession() }
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) throw new Error(json.message || 'load failed');

        let items = Array.isArray(json.data?.items) ? json.data.items : [];
        kicker.textContent = type === 'order' ? `คำสั่งซื้อ #${resourceId}` : `คำขอสีข้าว #${resourceId}`;
        title.textContent = type === 'order' ? 'เส้นทางสถานะคำสั่งซื้อ' : 'เส้นทางสถานะคำขอสีข้าว';

        const resourceEndpoint = type === 'order'
          ? `/api/orders/${encodeURIComponent(resourceId)}`
          : `/api/milling-requests/${encodeURIComponent(resourceId)}`;

        let resource = null;
        try {
          const resourceResp = await fetch(resourceEndpoint);
          const resourceJson = await resourceResp.json();
          if (resourceResp.ok && resourceJson.success) {
            resource = resourceJson.data || {};
            currentResource = resource;
            if (items.length === 0) {
              items = buildDerivedTimeline(type, resource, items);
            }
          }
        } catch (err) {
          console.error('resource fetch failed:', err);
        }

        const cancellation = await loadCancellationState(type, resourceId, resource || currentResource || null);

        if (cancellation && !items.some((item) => String(item.status || '').trim() === String(cancellation.status || '').trim())) {
          items = [
            {
              type,
              resource_id: resourceId,
              status: cancellation.status,
              message: getCancellationLabel(cancellation.status),
              is_read: true,
              created_at: cancellation.updated_at || cancellation.created_at || new Date().toISOString(),
              label: getCancellationLabel(cancellation.status),
            },
            ...items,
          ];
        }

        if (items.length === 0) {
          empty.classList.remove('hidden');
          shell.classList.add('hidden');
          updateCancellationBanner(cancellation?.status || null, resource || currentResource || null, cancellation);
          syncCancellationButton(resource || currentResource || null, cancellation);
          return;
        }

        shell.classList.remove('hidden');
        empty.classList.add('hidden');

        const displayedItems = items.map((item) => {
          const short = formatShortDateTime(item.created_at);

          return {
            ...item,
            label: statusLabel(type, item.status),
            day: short.day,
            time: short.time,
          };
        });

        list.innerHTML = displayedItems.map((item, index) => renderStatusCard(item, index, type)).join('');
      } catch (err) {
        console.error(err);
        empty.classList.remove('hidden');
        shell.classList.add('hidden');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCancellationReasons();
      document.getElementById('detail-cancel-btn')?.addEventListener('click', openCancellationModal);
      document.getElementById('cancel-close-btn')?.addEventListener('click', () => {
        closeCancellationModal();
        resetCancellationForm();
      });
      document.getElementById('cancel-form')?.addEventListener('submit', (event) => {
        event.preventDefault();
        submitCancellation();
      });
      document.getElementById('cancel-submit-btn')?.addEventListener('click', (event) => {
        event.preventDefault();
        submitCancellation();
      });
      document.getElementById('cancel-modal')?.addEventListener('click', (event) => {
        if (event.target === event.currentTarget) {
          closeCancellationModal();
          resetCancellationForm();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeCancellationModal();
        }
      });
      loadTimeline();
    });
  </script>
</body>
</html>
