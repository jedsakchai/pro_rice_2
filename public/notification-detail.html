<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ติดตามสถานะ</title>
  <link rel="stylesheet" href="/css/output.css">
  <style>
    html,
    body {
      background: #ffffff !important;
      background-image: none !important;
    }

    body::before {
      content: none !important;
      display: none !important;
      background: none !important;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 7.75rem 2.25rem minmax(0, 1fr);
      column-gap: 1rem;
      align-items: start;
      padding: 1.2rem 0;
      min-height: 6rem;
    }

    .timeline-date {
      text-align: right;
      color: #6b7280;
      font-size: 1.1rem;
      line-height: 1.55;
      padding-top: 0.1rem;
    }

    .timeline-track {
      position: relative;
      display: flex;
      justify-content: center;
      min-height: 100%;
    }

    .timeline-track::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #d1d5db;
      transform: translateX(-50%);
    }

    .timeline-dot {
      position: relative;
      z-index: 1;
      margin-top: 0.55rem;
      width: 1rem;
      height: 1rem;
      border-radius: 9999px;
      background: #71717a;
      box-shadow: 0 0 0 4px #ffffff;
    }

    .timeline-status {
      min-width: 0;
      padding-top: 0.15rem;
      color: #666666;
      font-size: 1.8rem;
      line-height: 1.18;
      font-weight: 400;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    @media (max-width: 640px) {
      .timeline-item {
        grid-template-columns: 5.75rem 1.75rem minmax(0, 1fr);
        column-gap: 0.75rem;
        padding: 1rem 0;
        min-height: 5.2rem;
      }

      .timeline-date {
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .timeline-status {
        font-size: 1.2rem;
        line-height: 1.35;
      }

      .timeline-dot {
        margin-top: 0.45rem;
        width: 0.9rem;
        height: 0.9rem;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-white text-gray-700">
  <header class="border-b border-gray-200 bg-white">
    <nav class="container-custom py-4 flex items-center justify-between">
      <a href="/" class="flex items-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-field-600">
        <span class="text-xl md:text-2xl font-bold text-field-700">โรงสีชุมชน</span>
      </a>
      <a href="/notifications.html" class="text-sm font-semibold text-field-700 hover:underline">กลับไปแจ้งเตือน</a>
    </nav>
  </header>

  <main class="px-4 py-6 sm:px-6 sm:py-8">
    <div class="mx-auto w-full max-w-4xl">
      <div class="mb-8 border-b border-gray-100 pb-4">
        <p id="detail-kicker" class="text-sm text-gray-500">กำลังโหลด...</p>
        <h1 id="detail-title" class="mt-1 text-xl sm:text-2xl font-semibold text-gray-700">เส้นทางสถานะ</h1>
      </div>

      <div id="timeline-empty" class="hidden py-12 text-center text-gray-500">ยังไม่มีประวัติสถานะสำหรับรายการนี้</div>
      <div id="timeline-shell" class="relative">
        <div id="timeline-list" class="relative"></div>
      </div>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    const ORDER_LABELS = {
      pending: 'รอดำเนินการ',
      accepted: 'ยอมรับคำสั่งซื้อแล้ว',
      pending_payment: 'รอชำระเงิน',
      payment_review: 'รอตรวจสอบการชำระเงิน',
      paid: 'ชำระเงินแล้ว',
      preparing: 'กำลังเตรียมสินค้า',
      ready_to_ship: 'พร้อมจัดส่ง',
      shipping: 'จัดส่งแล้ว',
      completed: 'สำเร็จ',
      cancelled: 'ยกเลิก'
    };

    const MILLING_LABELS = {
      pending_review: 'รอตรวจสอบ',
      accepted: 'รับคำสั่งแล้ว',
      awaiting_pickup: 'รอไปรับข้าว',
      received: 'รับข้าวแล้ว',
      queued: 'รอคิวสี',
      milling: 'กำลังสีข้าว',
      packing: 'กำลังแพ็ก',
      ready: 'พร้อมรับ/จัดส่ง',
      shipping: 'กำลังจัดส่ง',
      delivered: 'ส่งมอบแล้ว',
      cancelled: 'ยกเลิก'
    };

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatDate(value) {
      const date = new Date(value);
      return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatDateTime(value) {
      const date = new Date(value);
      return `${date.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })} เวลา ${date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.`;
    }

    function statusLabel(type, status) {
      const map = type === 'order' ? ORDER_LABELS : MILLING_LABELS;
      return map[status] || status || '-';
    }

    function formatShortDateTime(value) {
      const date = new Date(value);
      const day = date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      const time = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      return { day, time: `${time} น.` };
    }

    function parseDate(value) {
      const date = new Date(value);
      return Number.isFinite(date.getTime()) ? date : null;
    }

    function shiftMinutes(date, minutes) {
      const next = new Date(date.getTime());
      next.setMinutes(next.getMinutes() + minutes);
      return next;
    }

    function buildDerivedTimeline(type, resource, latestItems) {
      const path = type === 'order'
        ? ['pending', 'accepted', 'pending_payment', 'payment_review', 'paid', 'preparing', 'ready_to_ship', 'shipping', 'completed', 'cancelled']
        : ['pending_review', 'accepted', 'awaiting_pickup', 'received', 'queued', 'milling', 'packing', 'ready', 'shipping', 'delivered', 'cancelled'];

      const currentStatus = String(resource?.status || latestItems?.[0]?.status || '').trim();
      const currentIndex = path.indexOf(currentStatus);
      if (currentIndex < 0) return latestItems || [];

      const steps = path.slice(0, currentIndex + 1);
      const createdAt = parseDate(resource?.created_at || latestItems?.[steps.length - 1]?.created_at);
      const updatedAt = parseDate(resource?.updated_at || latestItems?.[0]?.created_at || resource?.created_at);
      const baseStart = createdAt || updatedAt || new Date();
      const baseEnd = updatedAt || baseStart;
      const totalMinutes = Math.max(steps.length - 1, 1) * 10;
      const anchor = shiftMinutes(baseEnd, -totalMinutes);

      return steps
        .map((status, index) => {
          const sourceDate = shiftMinutes(anchor, index * 10);
          return {
            type,
            resource_id: resource?.request_id || resource?.order_id || latestItems?.[0]?.resource_id,
            status,
            message: statusLabel(type, status),
            is_read: true,
            created_at: sourceDate.toISOString(),
            label: statusLabel(type, status),
            day: formatShortDateTime(sourceDate).day,
            time: formatShortDateTime(sourceDate).time,
          };
        })
        .reverse();
    }

    async function loadTimeline() {
      const type = getParam('type');
      const resourceId = getParam('resource_id');
      const kicker = document.getElementById('detail-kicker');
      const title = document.getElementById('detail-title');
      const badge = document.getElementById('detail-badge');
      const list = document.getElementById('timeline-list');
      const empty = document.getElementById('timeline-empty');
      const shell = document.getElementById('timeline-shell');

      if (!type || !resourceId) {
        kicker.textContent = 'ไม่พบรายการ';
        title.textContent = 'ติดตามสถานะ';
        empty.classList.remove('hidden');
        return;
      }

      try {
        const session = window.OwnerSession?.get?.();
        const encoded = (typeof window.btoa === 'function')
          ? window.btoa(unescape(encodeURIComponent(JSON.stringify(session))))
          : encodeURIComponent(JSON.stringify(session));
        const resp = await fetch(`/api/notifications/${encodeURIComponent(type)}/${encodeURIComponent(resourceId)}/timeline`, {
          headers: { 'x-session-data': encoded }
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) throw new Error(json.message || 'load failed');

        let items = Array.isArray(json.data?.items) ? json.data.items : [];
        if (type === 'order') {
          kicker.textContent = `คำสั่งซื้อ #${resourceId}`;
          title.textContent = 'เส้นทางสถานะคำสั่งซื้อ';
        } else {
          kicker.textContent = `คำขอสีข้าว #${resourceId}`;
          title.textContent = 'เส้นทางสถานะคำขอสีข้าว';
        }

        const resourceEndpoint = type === 'order'
          ? `/api/orders/${encodeURIComponent(resourceId)}`
          : `/api/milling-requests/${encodeURIComponent(resourceId)}`;

        if (items.length < 2) {
          try {
            const resourceResp = await fetch(resourceEndpoint);
            const resourceJson = await resourceResp.json();
            if (resourceResp.ok && resourceJson.success) {
              items = buildDerivedTimeline(type, resourceJson.data, items);
            }
          } catch (resourceErr) {
            console.error('derived timeline load failed:', resourceErr);
          }
        }

        if (items.length === 0) {
          empty.classList.remove('hidden');
          shell.classList.add('hidden');
          return;
        }

        shell.classList.remove('hidden');

        const latest = items[0]?.status || null;
        const displayedItems = items.map((item) => {
          const short = formatShortDateTime(item.created_at);
          return {
            ...item,
            label: statusLabel(type, item.status),
            day: short.day,
            time: short.time,
          };
        });

        list.innerHTML = displayedItems.map((item, index) => {
          const isLast = index === displayedItems.length - 1;
          return `
            <div class="timeline-item ${isLast ? 'pb-2' : ''}">
              <div class="timeline-date">
                <div class="whitespace-nowrap">${item.day}</div>
                <div class="whitespace-nowrap">${item.time}</div>
              </div>
              <div class="timeline-track">
                <div class="timeline-dot"></div>
              </div>
              <div class="min-w-0 pt-1">
                <div class="timeline-status max-w-2xl">${item.label}</div>
              </div>
            </div>
          `;
        }).join('');

        // Fetch resource details to show remark and cancel button area
        try {
          const resourceResp = await fetch(resourceEndpoint);
          const resourceJson = await resourceResp.json();
          if (resourceResp.ok && resourceJson.success) {
            const resource = resourceJson.data || {};
            // create remark area above timeline
            const detailsWrap = document.createElement('div');
            detailsWrap.className = 'mb-6 bg-white p-4 rounded-lg shadow-sm';
            const noteText = resource.cancel_reason || resource.note || '-';
            detailsWrap.innerHTML = `
              <div class="mb-2"><strong>หมายเหตุ:</strong></div>
              <div id="resource-note" class="text-sm text-gray-700 mb-3">${noteText}</div>
            `;
            const container = document.querySelector('.mx-auto.w-full.max-w-4xl');
            if (container && container.firstChild) {
              container.insertBefore(detailsWrap, container.children[1]);
            }
          }
        } catch (e) { console.error('resource fetch failed', e); }
      } catch (err) {
        console.error(err);
        empty.classList.remove('hidden');
        shell.classList.add('hidden');
      }
    }

    // Cancel modal (inside detail page)
    const DEFAULT_CANCEL_CHOICES = ['เปลี่ยนใจ', 'พบราคาถูกกว่า', 'ต้องการแก้ไขข้อมูล/ที่อยู่', 'โรงสียังไม่สะดวก', 'อื่นๆ'];
    function openCancelModal(type, resourceId) {
      let modal = document.getElementById('cancel-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'cancel-modal';
        modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/40';
        modal.innerHTML = `
          <div class="bg-white rounded-lg p-6 w-full max-w-lg">
            <h2 class="text-2xl font-semibold mb-4 text-green-800">เลือกเหตุผลที่ต้องการยกเลิก</h2>
            <form id="cancel-form">
              <div id="cancel-choices" class="grid grid-cols-1 gap-3 mb-4"></div>
              <div class="mb-4">
                <label class="block text-sm font-medium mb-2">หมายเหตุ (เพิ่มเติม)</label>
                <textarea id="cancel-note" class="w-full border rounded p-3 text-sm" rows="4" placeholder="ระบุรายละเอียดเพิ่มเติม (ไม่บังคับ)"></textarea>
              </div>
              <div class="flex justify-between items-center">
                <button type="submit" id="cancel-submit-btn" class="px-6 py-2 bg-purple-700 text-white font-semibold rounded-md">ส่งคำขอยกเลิก</button>
                <button type="button" id="cancel-close-btn" class="px-6 py-2 border-4 border-purple-700 text-purple-700 font-semibold rounded-md">ปิด</button>
              </div>
            </form>
          </div>
        `;
        document.body.appendChild(modal);

        // populate choices (larger labels for readability)
        const choicesWrap = modal.querySelector('#cancel-choices');
        DEFAULT_CANCEL_CHOICES.forEach((c, idx) => {
          const id = `cancel-choice-detail-${idx}`;
          const div = document.createElement('div');
          div.innerHTML = `<label class="inline-flex items-start gap-3"><input type="checkbox" id="${id}" value="${c}" class="mt-1 form-checkbox w-5 h-5"> <span class="text-lg leading-6">${c}</span></label>`;
          choicesWrap.appendChild(div);
        });

        modal.querySelector('#cancel-close-btn')?.addEventListener('click', () => { modal.remove(); });

        modal.querySelector('#cancel-form')?.addEventListener('submit', async (ev) => {
          ev.preventDefault();
          const choices = Array.from(modal.querySelectorAll('#cancel-choices input[type=checkbox]:checked')).map(i => i.value);
          const note = modal.querySelector('#cancel-note')?.value || '';
          try {
            const session = window.OwnerSession?.get?.() || {};
            const enc = (typeof window.btoa === 'function')
              ? window.btoa(unescape(encodeURIComponent(JSON.stringify(session))))
              : encodeURIComponent(JSON.stringify(session));
            const resp = await fetch(`/api/notifications/${encodeURIComponent(type)}/${encodeURIComponent(resourceId)}/cancel`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-session-data': enc },
              body: JSON.stringify({ choices, note })
            });
            const j = await resp.json();
            if (j && j.success) {
              window.FormUtils.showToast('ส่งคำขอยกเลิกแล้ว', 'success');
              modal.remove();
              // refresh timeline
              loadTimeline();
              window.dispatchEvent(new Event('notifications:changed'));
            } else {
              window.FormUtils.showToast((j && j.message) || 'ไม่สามารถส่งคำขอยกเลิกได้', 'error');
            }
          } catch (err) {
            console.error('cancel submit failed', err);
            window.FormUtils.showToast('เกิดข้อผิดพลาดขณะส่งคำขอยกเลิก', 'error');
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', loadTimeline);
  </script>
</body>
</html>
