<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="หน้าหลักสำหรับชาวบ้าน">
    <title>หน้าหลัก - โรงสีชุมชน</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="min-h-screen relative bg-gradient-to-r from-rice-700 to-rice-800">
    <img src="/images/rice-mill-hero.jpg" alt="" aria-hidden="true" class="pointer-events-none absolute inset-0 z-0 h-full w-full object-cover opacity-20">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-40 bg-white shadow-subtle">
        <nav class="container-custom py-4 flex items-center justify-between">
            <a href="/" class="flex items-center">
                <span class="text-xl md:text-2xl font-bold text-field-700">โรงสีชุมชน</span>
            </a>
            <ul class="hidden md:flex gap-8 items-center">
                <li><a href="/" class="text-field-700 font-semibold">หน้าแรก</a></li>
                <li><a href="/inquiry.html" class="text-gray-700 hover:text-field-700">สอบถาม</a></li>
                <li><a href="/contact.html" class="text-gray-700 hover:text-field-700">ติดต่อ</a></li>
                <li><a href="/login.html" class="text-gray-700 hover:text-field-700">เข้าสู่ระบบ</a></li>
            </ul>
            <button id="mobile-menu-btn" class="md:hidden p-2 hover:bg-gray-100 rounded-lg" aria-label="เปิดเมนูมือถือ" aria-expanded="false">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100">
            <ul class="container-custom py-4 space-y-2">
                <li><a href="/" class="block py-2 text-field-700 font-semibold">หน้าแรก</a></li>
                <li><a href="/inquiry.html" class="block py-2 text-gray-700 hover:text-field-700">สอบถาม</a></li>
                <li><a href="/contact.html" class="block py-2 text-gray-700 hover:text-field-700">ติดต่อ</a></li>
                <li><a href="/login.html" class="block py-2 text-gray-700 hover:text-field-700">เข้าสู่ระบบ</a></li>
            </ul>
        </div>
    </header>

    <main class="relative z-10 min-h-screen">
        <section class="container-custom py-10">
            <div class="card max-w-2xl mx-auto">
                <div class="text-center">
                    <h1 class="text-2xl md:text-3xl font-bold text-field-700">ยินดีต้อนรับ</h1>
                    <p id="welcome-name" class="mt-2 text-lg text-gray-600"></p>
                </div>

                <div class="mt-8 grid gap-4">
                    <!-- หน้าแรก — ดูโรงสีทั้งหมด -->
                    <a href="/" class="btn-primary w-full inline-flex items-center justify-center gap-3">
                        <span class="inline-flex items-center justify-center w-8 h-8 bg-white/20 rounded">
                            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 12L12 4l9 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </span>
                        หน้าแรก — ดูโรงสีทั้งหมด
                    </a>

                    <!-- ประวัติของฉัน -->
                    <a href="/my-history-combined.html" class="btn-primary w-full inline-flex items-center justify-center gap-3">
                        <span class="inline-flex items-center justify-center w-8 h-8 bg-white/20 rounded">
                            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12h6M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        📦 ประวัติของฉัน
                    </a>

                    <!-- สอบถาม -->
                    <a href="/inquiry.html" class="btn-primary w-full inline-flex items-center justify-center gap-3">
                        <span class="inline-flex items-center justify-center w-8 h-8 bg-white/20 rounded">
                            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M7 8h10M7 12h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M21 12c0 4.418-4.03 8-9 8-1.06 0-2.08-.163-3.03-.46L3 21l1.21-4.21C3.45 15.39 3 13.74 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        สอบถาม
                    </a>

                    <!-- ติดต่อ -->
                    <a href="/contact.html" class="btn-primary w-full inline-flex items-center justify-center gap-3">
                        <span class="inline-flex items-center justify-center w-8 h-8 bg-white/20 rounded">
                            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 8l9 6 9-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </span>
                        ติดต่อ
                    </a>

                    <div class="pt-2 text-center">
                        <a href="#" class="btn-link text-sm" id="logout-link">ออกจากระบบ</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = window.OwnerSession?.get?.();
            if (!session) {
                window.location.href = '/login.html';
                return;
            }
            // Owner ไปแดชบอร์ดเจ้าของ
            if (session.role === 'owner') {
                window.location.href = '/owner-dashboard.html';
                return;
            }
            // แสดงชื่อผู้ใช้
            const nameEl = document.getElementById('welcome-name');
            if (nameEl) nameEl.textContent = session.owner_name || session.mill_name || '';

            // Logout
            document.getElementById('logout-link')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.OwnerSession?.clear?.();
                window.location.href = '/';
            });
        });
    </script>
</body>
</html>
