<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>จัดการสินค้า - เจ้าของโรงสี</title>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body class="min-h-screen bg-gray-50">
  <main class="max-w-4xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-4">จัดการรายการสินค้า</h1>

    <section class="mb-6">
      <form id="add-product-form" class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-white p-4 rounded shadow">
        <input name="product_name_th" placeholder="ชื่อสินค้า (ไทย)" class="input-field" required>
        <input name="product_name" placeholder="Product name (EN)" class="input-field">
        <input name="category_th" placeholder="หมวดหมู่ (ไทย)" class="input-field" required>
        <input name="category" placeholder="category key" class="input-field" required>
        <input name="price" type="number" step="0.01" placeholder="ราคา" class="input-field" required>
        <input name="unit_th" placeholder="หน่วย (ไทย)" class="input-field">
        <input name="unit" placeholder="unit" class="input-field">
        <input name="stock" type="number" placeholder="จำนวนคงเหลือ" class="input-field" required>
        <input name="image_url" placeholder="เส้นทางรูป (เช่น /images/rice-1.jpg)" class="input-field md:col-span-2">
        <button class="btn-primary md:col-span-2" type="submit">เพิ่มสินค้า</button>
      </form>
    </section>

    <section>
      <h2 class="font-semibold mb-2">รายการสินค้าของโรงสี</h2>
      <div id="owner-products-list" class="space-y-3"></div>
    </section>
  </main>

  <script src="/js/main.js"></script>
  <script src="/js/owner-products.js"></script>
</body>
</html>
