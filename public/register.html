<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="สมัครสมาชิกสำหรับเจ้าของโรงสี">
    <title>สมัครสมาชิก - เจ้าของโรงสี</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="min-h-screen relative bg-gradient-to-r from-rice-700 to-rice-800">
    <!--
        สมัครสมาชิก (Owner)
        - ฟอร์มสมัครสำหรับเจ้าของโรงสี (สร้างบัญชี)
        - /js/register.js จะ validate/submit และเรียก API register
        - #toast-container ใช้แสดง toast จาก FormUtils (อยู่ใน /js/main.js)
    -->
    <!-- พื้นหลังแบบ hero (เหมือนหน้า index): รูปภาพจาง ๆ อยู่หลังเนื้อหา -->
    <img src="/images/rice-mill-hero.jpg" alt="" aria-hidden="true" class="pointer-events-none absolute inset-0 z-0 h-full w-full object-cover opacity-20">

    <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12">
        <section class="w-full max-w-xl card">
            <h1 class="text-center text-field-700 mb-8">สมัครสมาชิก</h1>

            <form id="register-form" class="space-y-5" autocomplete="off">
                <div>
                    <label for="role" class="form-label">บทบาท</label>
                    <select id="role" name="role" class="input-field" required>
                        <option value="villager">ชาวบ้าน / บุคคลทั่วไป</option>
                        <option value="owner">เจ้าของโรงสี</option>
                    </select>
                </div>

                <div>
                    <label for="owner_name" class="form-label">ชื่อ-นามสกุล</label>
                    <input id="owner_name" name="owner_name" type="text" class="input-field" placeholder="ชื่อ-นามสกุล" required maxlength="120">
                </div>

                <!-- Villager-only: contact fields -->
                <div id="villager-details" class="space-y-4">
                    <div>
                        <label for="villager_phone" class="form-label">เบอร์โทรศัพท์</label>
                        <input id="villager_phone" name="villager_phone" type="tel" class="input-field" placeholder="เช่น 081-234-5678" maxlength="30">
                    </div>

                    <div>
                        <label for="villager_address" class="form-label">ที่อยู่โดยละเอียด</label>
                        <textarea id="villager_address" name="villager_address" class="input-field" rows="3" placeholder="บ้านเลขที่, หมู่, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>
                    </div>
                </div>

                <div id="mill-section">
                    <label for="mill_id" class="form-label">โรงสี</label>
                    <select id="mill_id" name="mill_id" class="input-field">
                        <option value="">เลือกโรงสี</option>
                        <option value="1">โรงสีจังหวัลอยกลาง</option>
                        <option value="2">โรงสีเหนือวิลเลจ</option>
                        <option value="3">โรงสีใต้ พรีเมี่ยม</option>
                    </select>
                </div>

                <!-- Owner-only: Mill details + map -->
                <div id="owner-mill-details" class="hidden space-y-5">
                    <div>
                        <label for="mill_location_th" class="form-label">ที่อยู่โรงสี</label>
                        <textarea id="mill_location_th" name="mill_location_th" class="input-field" rows="3" placeholder="ที่อยู่/ตำบล/อำเภอ/จังหวัด"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="mill_phone" class="form-label">เบอร์โทรโรงสี</label>
                            <input id="mill_phone" name="mill_phone" type="text" class="input-field" placeholder="เช่น 081-234-5678" maxlength="30">
                        </div>
                        <div>
                            <label for="mill_email" class="form-label">อีเมลโรงสี</label>
                            <input id="mill_email" name="mill_email" type="email" class="input-field" placeholder="เช่น mill@example.com" maxlength="120">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="latitude" class="form-label">ละติจูด (Latitude)</label>
                            <input id="latitude" name="latitude" type="number" step="0.00000001" class="input-field" placeholder="เช่น 13.756331">
                        </div>
                        <div>
                            <label for="longitude" class="form-label">ลองจิจูด (Longitude)</label>
                            <input id="longitude" name="longitude" type="number" step="0.00000001" class="input-field" placeholder="เช่น 100.501762">
                        </div>
                    </div>

                    <div>
                        <label for="map_link" class="form-label">ลิงก์ตำแหน่ง (Google Maps)</label>
                        <input id="map_link" name="map_link" type="url" class="input-field" placeholder="วางลิงก์ เช่น https://maps.app.goo.gl/... หรือ https://www.google.com/maps/...">
                        <div class="mt-2 flex flex-col sm:flex-row gap-2">
                            <button id="btn-use-map-link" type="button" class="btn-secondary px-6 py-2 text-sm">ใช้ลิงก์กับแผนที่</button>
                            <button id="btn-open-map-link" type="button" class="btn-link text-sm">เปิดลิงก์ใน Google Maps</button>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">หมายเหตุ: ลิงก์แบบย่อ (maps.app.goo.gl) บางครั้งดึงพิกัดอัตโนมัติไม่ได้ — ระบบจะช่วยเปิดให้ แล้วให้คัดลอกพิกัดมาใส่ในช่อง lat/lng</p>
                    </div>

                    <div class="w-full rounded-lg overflow-hidden shadow-subtle" style="height: 360px;">
                        <iframe
                            id="mill-map-preview"
                            title="แผนที่ตัวอย่าง"
                            class="w-full h-full"
                            src="https://www.google.com/maps?q=%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%80%E0%B8%97%E0%B8%A8%E0%B9%84%E0%B8%97%E0%B8%A2&hl=th&gl=TH&z=6&output=embed"
                            style="border:0;"
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>

                <div>
                    <label for="username" class="form-label">username</label>
                    <input id="username" name="username" type="text" class="input-field" placeholder="username" required maxlength="120" pattern="[A-Za-z0-9]+" title="ใช้ได้เฉพาะตัวอักษรภาษาอังกฤษและตัวเลข">
                </div>

                <div>
                    <label for="password" class="form-label">password</label>
                    <input id="password" name="password" type="password" class="input-field" placeholder="อย่างน้อย 6 ตัวอักษร" required maxlength="120" pattern="[A-Za-z0-9]+" title="ใช้ได้เฉพาะตัวอักษรภาษาอังกฤษและตัวเลข">
                </div>

                <div class="pt-2 flex gap-3 justify-center flex-col sm:flex-row">
                    <button type="submit" class="btn-primary px-10">สมัคร</button>
                    <a href="/login.html" class="btn-secondary px-10 text-center">กลับไปเข้าสู่ระบบ</a>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-sm text-field-700 hover:underline">กลับหน้าแรก</a>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <!-- main.js: utility/toast (FormUtils) -->
    <script src="/js/main.js"></script>
    <!-- register.js: ส่งข้อมูลสมัครสมาชิกไป API และจัดการผลลัพธ์ -->
    <script src="/js/register.js" defer></script>
</body>
</html>
