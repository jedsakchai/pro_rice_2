<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>สถานะคำสั่งซื้อ</title>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body class="min-h-screen relative bg-gradient-to-r from-rice-700 to-rice-800">
  <header class="sticky top-0 z-40 bg-white shadow-subtle">
    <nav class="container-custom py-4 flex items-center justify-between">
      <a href="/" class="flex items-center focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-field-600">
        <span class="text-xl md:text-2xl font-bold text-field-700">โรงสีชุมชน</span>
      </a>
      <button id="mobile-menu-btn" class="md:hidden p-2 hover:bg-gray-100 rounded-lg" aria-label="เปิดเมนูมือถือ" aria-expanded="false">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </nav>
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-grain-200">
      <ul class="container-custom py-4 space-y-2"></ul>
    </div>
  </header>

  <main class="relative z-10 px-6 py-12">
    <div class="max-w-3xl mx-auto">
      <section class="card p-6">
        <h1 class="text-lg font-semibold mb-4">สถานะคำสั่งซื้อ</h1>
        <div id="order-status-container">กำลังโหลด...</div>
      </section>
    </div>
  </main>
  
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const q = new URLSearchParams(window.location.search);
      const orderId = q.get('order_id');
      const el = document.getElementById('order-status-container');
      if (!orderId) { el.innerHTML = '<div class="text-red-600">ไม่มีหมายเลขคำสั่งซื้อ</div>'; return; }
      try {
        const res = await fetch('/api/orders/' + encodeURIComponent(orderId));
        const json = await res.json();
        if (!res.ok || !json.success) { el.innerHTML = '<div class="text-red-600">ไม่พบคำสั่งซื้อ</div>'; return; }
        const o = json.data;
        
        const statusMap = {
          pending: 'รอดำเนินการ',
          accepted: 'ยอมรับคำสั่งซื้อแล้ว',
          pending_payment: 'รอชำระเงิน',
          payment_review: 'รอตรวจสอบการชำระเงิน',
          paid: 'ชำระเงินแล้ว',
          preparing: 'กำลังเตรียมสินค้า',
          ready_to_ship: 'พร้อมจัดส่ง',
          shipping: 'จัดส่งแล้ว',
          completed: 'สำเร็จ',
          cancelled: 'ยกเลิก'
        };
        
        el.innerHTML = `
          <div class="space-y-2">
            <div><strong>หมายเลข:</strong> ${o.order_number || o.order_id}</div>
            <div><strong>ชื่อลูกค้า:</strong> ${o.customer_name}</div>
            <div><strong>เบอร์:</strong> ${o.phone}</div>
            <div><strong>ที่อยู่:</strong> ${o.address}</div>
            <div class="flex items-center gap-3 flex-nowrap overflow-x-auto"><strong class="shrink-0">สถานะ:</strong> <span class="font-semibold text-rice-700 shrink-0 whitespace-nowrap">${statusMap[o.status] || o.status || 'ไม่ทราบ'}</span><a href="/notification-detail.html?type=order&resource_id=${encodeURIComponent(o.order_id)}" class="shrink-0 inline-flex items-center rounded-full border border-rice-700 px-3 py-1 text-sm font-semibold text-rice-700 whitespace-nowrap hover:bg-rice-50">ดูเพิ่มเติม</a></div>
            <div><strong>รวม:</strong> ฿${Number(o.total || 0).toFixed(2)}</div>
            <div class="mt-3"><strong>รายการ:</strong></div>
            <div class="mt-2 space-y-2">${(o.items||[]).map(i=>`<div class="flex justify-between"><div>${i.product_name_th} x ${i.quantity}</div><div>฿${Number(i.subtotal).toFixed(2)}</div></div>`).join('')}</div>
          </div>
        `;
        // Add cancel button for the ordering villager when allowed
        try {
          const session = window.OwnerSession?.get?.();
          const villagerId = session?.villager_id ? Number(session.villager_id) : null;
          const canCancel = villagerId && Number(o.villager_id) === villagerId && ['pending','accepted','pending_payment','payment_review','paid','preparing'].includes(String(o.status));
          if (canCancel) {
            const btn = document.createElement('button');
            btn.textContent = 'ยกเลิกคำสั่งซื้อ';
            btn.className = 'mt-4 inline-block px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700';
            btn.addEventListener('click', async () => {
              // open cancel modal implemented in /js/notifications.js
              if (typeof openCancelModal === 'function') {
                openCancelModal('order', o.order_id);
              } else {
                if (!confirm('ต้องการยกเลิกคำสั่งซื้อนี้ใช่หรือไม่?')) return;
                try {
                  btn.disabled = true;
                  const resp = await fetch('/api/orders/' + encodeURIComponent(o.order_id), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'cancelled' })
                  });
                  const j = await resp.json().catch(() => null);
                  if (!resp.ok || !j || j.success !== true) {
                    throw new Error((j && j.message) || 'ยกเลิกไม่สำเร็จ');
                  }
                  alert('ยกเลิกคำสั่งซื้อเรียบร้อยแล้ว');
                  window.location.reload();
                } catch (e) {
                  console.error('Cancel failed', e);
                  btn.disabled = false;
                  alert(e.message || 'ยกเลิกไม่สำเร็จ');
                }
              }
            });
            el.appendChild(btn);
          }
        } catch (e) { console.error(e); }
      } catch (err) {
        console.error(err);
        el.innerHTML = '<div class="text-red-600">เกิดข้อผิดพลาด</div>';
      }
    });
  </script>
    <!-- Cancel modal (reused from notifications page) -->
    <div id="cancel-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white rounded-lg p-6 w-full max-w-lg">
        <h2 class="text-lg font-semibold mb-3">เลือกเหตุผลที่ต้องการยกเลิก</h2>
        <form id="cancel-form">
          <div id="cancel-choices" class="grid grid-cols-1 gap-2 mb-3"></div>
          <div class="mb-3">
            <label class="block text-sm font-medium mb-1">หมายเหตุ (เพิ่มเติม)</label>
            <textarea id="cancel-note" class="w-full border rounded p-2" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม (ไม่บังคับ)"></textarea>
          </div>
          <div class="flex justify-end gap-2">
            <button type="button" id="cancel-cancel-btn" class="px-4 py-2 border rounded">ยกเลิก</button>
            <button type="submit" id="cancel-confirm-btn" class="px-4 py-2 bg-red-600 text-white rounded">ยืนยันยกเลิก</button>
          </div>
        </form>
      </div>
    </div>
</body>
</html>
